<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Lumina</title>

  <style>
    body {
      margin: 0;
      padding: 0;

      background: url('./galaxie.jpg') no-repeat center center fixed;
      background-size: cover;

      color: white;
      font-family: Arial, sans-serif;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      min-height: 100vh;
      text-align: center;

      overflow: hidden;
    }

    /* 🌌 pluie d'étoiles */
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }

    .star {
      position: absolute;
      top: -10px;

      width: 3px;
      height: 3px;

      background: white;
      border-radius: 50%;

      /* ⭐ étoiles plus visibles */
      box-shadow:
        0 0 6px #00ffd5,
        0 0 12px #6a5cff,
        0 0 18px rgba(255,255,255,0.8);

      opacity: 0.9;

      animation: fall linear infinite, glow 2s infinite ease-in-out;
    }

    /* 🌠 chute */
    @keyframes fall {
      0% {
        transform: translateY(-10vh) translateX(0);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      100% {
        transform: translateY(110vh) translateX(20px);
        opacity: 0;
      }
    }

    /* ✨ petit effet vivant */
    @keyframes glow {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.4);
      }
    }

    /* 🌌 TITRE PLUS GROS + PLUS HAUT */
    h1 {
      font-size: 100px; /* ⭐ plus grand */
      letter-spacing: 8px;
      margin: 0;

      margin-top: -80px; /* ⭐ remonte le titre */

      text-shadow:
        0 0 20px #00ffd5,
        0 0 40px #6a5cff,
        0 0 80px rgba(0,255,213,0.4);

      animation: glowText 3s infinite ease-in-out;
      z-index: 2;
    }

    @keyframes glowText {
      0%, 100% {
        text-shadow: 0 0 20px #00ffd5, 0 0 40px #6a5cff;
      }
      50% {
        text-shadow: 0 0 35px #00ffd5, 0 0 70px #6a5cff;
      }
    }

    p {
      font-size: 18px;
      margin-top: 10px;
      max-width: 600px;
      opacity: 0.9;
      z-index: 2;
    }

    /* menu */
    .menu {
      margin-top: 40px;
      display: flex;
      gap: 25px;
      z-index: 2;
    }

    .menu a {
      color: #00ffd5;
      text-decoration: none;
      font-weight: bold;
      padding: 8px 14px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .menu a:hover {
      background: rgba(0, 255, 213, 0.15);
      box-shadow: 0 0 12px rgba(0, 255, 213, 0.4);
    }

    /* image */
    .image {
      margin-top: 40px;
      z-index: 2;
    }

    .image img {
      width: 180px;
      border-radius: 14px;
      box-shadow:
        0 0 20px rgba(0,255,213,0.3),
        0 10px 30px rgba(0,0,0,0.5);
    }

  </style>
</head>

<body>

  <!-- 🌠 étoiles -->
  <div class="stars">
    <!-- génération simple (stable) -->
    <div class="star" style="left:10%; animation-duration:6s;"></div>
    <div class="star" style="left:20%; animation-duration:5s;"></div>
    <div class="star" style="left:30%; animation-duration:7s;"></div>
    <div class="star" style="left:40%; animation-duration:4s;"></div>
    <div class="star" style="left:50%; animation-duration:6s;"></div>
    <div class="star" style="left:60%; animation-duration:5s;"></div>
    <div class="star" style="left:70%; animation-duration:8s;"></div>
    <div class="star" style="left:80%; animation-duration:6s;"></div>
    <div class="star" style="left:90%; animation-duration:5s;"></div>
  </div>

  <h1>LUMINA</h1>

  <p>Revenir à soi. Se libérer. Créer une vie alignée.</p>

  <div class="menu">
    <a href="index.html">Accueil</a>
    <a href="contenu.html">Contenu</a>
    <a href="liens.html">Liens</a>
  </div>

  <div class="image">
    <img src="./galaxie.jpg" alt="image">
  </div>

</body>
</html>
