<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Lumina</title>

  <style>
    body {
      margin: 0;
      padding: 0;

      background: url('./galaxie.jpg') no-repeat center center fixed;
      background-size: cover;

      color: white;
      font-family: Arial, sans-serif;

      /* 🌟 centrage global */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      min-height: 100vh;
      text-align: center;
    }

    /* 🌌 titre principal */
    h1 {
      font-size: 64px;
      letter-spacing: 4px;
      margin: 0;

      text-shadow:
        0 0 15px #00ffd5,
        0 0 30px #6a5cff;
    }

    /* ✨ sous-titre */
    p {
      font-size: 18px;
      margin-top: 10px;
      max-width: 600px;
      opacity: 0.9;
    }

    /* 🌠 menu */
    .menu {
      margin-top: 40px;
      display: flex;
      gap: 25px;
    }

    .menu a {
      color: #00ffd5;
      text-decoration: none;
      font-weight: bold;
      font-size: 16px;

      padding: 8px 14px;
      border-radius: 10px;

      transition: 0.3s;
    }

    .menu a:hover {
      background: rgba(0, 255, 213, 0.15);
      box-shadow: 0 0 12px rgba(0, 255, 213, 0.4);
    }

    /* 🌙 image centrale */
    .image {
      margin-top: 40px;
    }

    .image img {
      width: 180px;
      border-radius: 14px;

      box-shadow:
        0 0 20px rgba(0,255,213,0.3),
        0 10px 30px rgba(0,0,0,0.5);
    }
  </style>
</head>

<body>

  <h1>LUMINA</h1>

  <p>Revenir à soi. Se libérer. Créer une vie alignée.</p>

  <div class="menu">
    <a href="index.html">Accueil</a>
    <a href="contenu.html">Contenu</a>
    <a href="liens.html">Liens</a>
  </div>

  <div class="image">
    <img src="./galaxie.jpg" alt="image">
  </div>

</body>
</html>
