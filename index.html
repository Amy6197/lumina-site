<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Lumina</title>

  <style>
body {
  margin: 0;
  padding: 0;

  background: url('./galaxie.jpg') no-repeat center center fixed;
  background-size: cover;

  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
}

/* 🌌 TITRE COSMIQUE */
h1 {
  margin-top: 60px;
  font-size: 52px;
  letter-spacing: 2px;

  color: #ffffff;
  text-shadow:
    0 0 10px #00ffd5,
    0 0 20px #00ffd5,
    0 0 40px #6a5cff;
}

/* ✨ TEXTE */
p {
  font-size: 18px;
  opacity: 0.9;
  margin-top: 10px;
  text-shadow: 0 0 10px rgba(0,0,0,0.6);
}

/* 🌠 MENU COSMIQUE */
.menu {
  margin-top: 40px;
}

.menu a {
  margin: 0 15px;
  color: #00ffd5;
  text-decoration: none;
  font-weight: bold;

  padding: 6px 12px;
  border-radius: 8px;

  transition: 0.3s;

  text-shadow: 0 0 10px rgba(0,255,213,0.6);
}

.menu a:hover {
  color: white;
  background: rgba(0, 255, 213, 0.15);
  box-shadow: 0 0 15px rgba(0, 255, 213, 0.4);
}

/* 🌙 IMAGE CENTRALE */
.image {
  margin-top: 50px;
}

.image img {
  width: 180px;
  border-radius: 12px;

  box-shadow:
    0 0 15px rgba(0,255,213,0.3),
    0 10px 30px rgba(0,0,0,0.5);
}
  </style>
</head>

<body>

  <h1>LUMINA</h1>

  <p>
    Revenir à soi. Se libérer. Créer une vie alignée.
  </p>

  <div class="menu">
    <a href="index.html">Accueil</a>

    <a href="liens.html">Liens</a>
  </div>

  <div class="image">
    <img src="./galaxie.jpg" alt="image">
  </div>

</body>
</html>
