<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ton Prénom • Intuition & Alignement</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: #0a0a0a;
            color: #d4c3a8;
            font-family: 'Inter', sans-serif;
            text-align: center;
            line-height: 1.7;
            overflow-x: hidden;
        }

        .container {
            max-width: 720px;
            margin: 140px auto 100px;
            padding: 0 25px;
        }

        .symbol {
            font-size: 2.2rem;
            margin-bottom: 20px;
            opacity: 0.7;
            letter-spacing: 8px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4.2rem;
            font-weight: 700;
            margin: 0 0 15px 0;
            color: #e8d5b8;
            letter-spacing: 3px;
        }

        .subtitle {
            font-size: 1.45rem;
            margin-bottom: 60px;
            opacity: 0.85;
            letter-spacing: 4px;
        }

        .text {
            font-size: 1.18rem;
            max-width: 560px;
            margin: 0 auto 70px;
            opacity: 0.92;
        }

        .btn {
            display: inline-block;
            padding: 16px 48px;
            border: 2px solid #d4af87;
            color: #d4af87;
            font-size: 1.05rem;
            letter-spacing: 3px;
            text-decoration: none;
            transition: all 0.5s ease;
        }

        .btn:hover {
            background: #d4af87;
            color: #0a0a0a;
            transform: translateY(-3px);
        }

        .footer-symbol {
            margin-top: 100px;
            font-size: 1.6rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="symbol">✧ ✦ ✧</div>
        
        <h1>Ton Prénom</h1>
        <p class="subtitle">INTUITION • ALIGNEMENT • TRANSFORMATION</p>
        
        <p class="text">
            Je t’accompagne à reconnecter avec ton intuition profonde et à créer une vie plus alignée, 
            entre spiritualité et réalité concrète.
        </p>
        
        <a href="#" class="btn">ENTRER DANS LE VOYAGE</a>
        
        <div class="footer-symbol">✧</div>
    </div>
</body>
</html>
